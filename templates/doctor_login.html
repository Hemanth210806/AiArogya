{% extends "base.html" %}
{% block title %}Doctor Login — ArogyaAI{% endblock %}

{% block content %}
<style>
  @media (max-width: 600px) {
    .login-container { margin: 1rem !important; }
    .glass-card { padding: 1.5rem !important; border-radius: 20px !important; }
    .btn-lg { padding: 1rem !important; font-size: 1.05rem !important; }
  }
</style>

<div class="page fade-in login-container" style="max-width: 400px; margin: 2rem auto;">
  <div class="card glass-card" style="padding: 2rem; border-top: 8px solid #2e7d32; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);">
    <div style="text-align: center; margin-bottom: 2rem;">
      <div style="font-size: 3.5rem; margin-bottom: 0.5rem; animation: pulse-soft 2s infinite;">🩺</div>
      <h1 style="font-size: 1.6rem; color: #1b5e20; margin: 0; font-weight: 900;">Doctor Portal</h1>
      <p style="color: #666; font-size: 0.9rem; font-weight: 600; margin-top: 0.3rem;">Secure Medical Access</p>
    </div>

    <form method="POST">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group" style="margin-bottom: 1.2rem;">
        <label style="display: block; margin-bottom: 0.5rem; font-weight: 800; color: #2e7d32; font-size: 0.8rem; text-transform: uppercase;">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="doctor@arogyaai.in" required style="width: 100%; padding: 0.9rem; border-radius: 12px; border: 1.5px solid #eee; font-size: 0.95rem;">
      </div>
      <div class="form-group" style="margin-bottom: 1.8rem;">
        <label style="display: block; margin-bottom: 0.5rem; font-weight: 800; color: #2e7d32; font-size: 0.8rem; text-transform: uppercase;">Secure Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required style="width: 100%; padding: 0.9rem; border-radius: 12px; border: 1.5px solid #eee; font-size: 0.95rem;">
      </div>
      
      <button type="submit" class="btn btn-success btn-lg btn-full" style="background: linear-gradient(135deg, #2e7d32, #43a047); border: none; font-weight: 900; border-radius: 15px; box-shadow: 0 10px 20px rgba(46,125,50,0.2);">🔓 Login to Portal</button>
    </form>
    
    <div style="text-align: center; margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem;">
      <a href="{{ url_for('doctor.register') }}" style="color: #2e7d32; text-decoration: none; font-size: 0.95rem; font-weight: 800;">🆕 Create New Doctor Account</a>
      <a href="/login" style="color: #1565C0; text-decoration: none; font-size: 0.9rem; font-weight: 600;">← Back to Patient Portal</a>
    </div>
  </div>
</div>
{% endblock %}
